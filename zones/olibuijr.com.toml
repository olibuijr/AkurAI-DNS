[zone]
name = "olibuijr.com."
ttl = 900

[soa]
mname = "ns1.olibuijr.com."
rname = "admin.olibuijr.com."
serial = 2026062402
refresh = 3600
retry = 900
expire = 604800
minimum = 300

[[ns]]
name = "ns1.olibuijr.com."

[[ns]]
name = "ns2.olibuijr.com."

# Root domain — points to EC2
[[record]]
name = "@"
type = "A"
value = "3.94.46.219"

# www
[[record]]
name = "www"
type = "A"
value = "3.94.46.219"

# Nameservers (glue)
[[record]]
name = "ns1"
type = "A"
value = "3.94.46.219"

[[record]]
name = "ns2"
type = "A"
value = "3.94.46.219"

# Mail
[[record]]
name = "mail"
type = "A"
value = "3.94.46.219"

[[record]]
name = "@"
type = "MX"
priority = 10
value = "mail.olibuijr.com."

# Auth / IDP
[[record]]
name = "auth"
type = "A"
value = "3.94.46.219"

# Vault
[[record]]
name = "vault"
type = "A"
value = "3.94.46.219"

# SPF
[[record]]
name = "@"
type = "TXT"
value = "v=spf1 ip4:3.94.46.219 mx -all"

# Brevo verification
[[record]]
name = "@"
type = "TXT"
value = "brevo-code:6860f36888d46dad70f5ac482e5e6c51"

# DMARC
[[record]]
name = "_dmarc"
type = "TXT"
value = "v=DMARC1; p=quarantine; rua=mailto:postmaster@olibuijr.com"

# DKIM
[[record]]
name = "mail._domainkey"
type = "TXT"
value = "v=DKIM1;h=sha256;k=rsa;"
